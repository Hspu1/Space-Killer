services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/snippets:/etc/nginx/snippets:ro
      - ./deploy/nginx/error.html:/var/www/html/error.html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:80/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          memory: 64M

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    shm_size: 4gb
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4GB

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server"] 
    volumes:
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  migrator:
    build: .
    image: my-app-image:latest
    container_name: migrator
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  api:
    build:
      context: .
      args:
        - APP_PORT=${APP_PORT:-8000}
    image: custom-app-image:latest
    container_name: api
    restart: always
    env_file: .env
    environment:
      GRANIAN_PROXY_HEADERS: "true"
      GRANIAN_FORWARDED_ALLOW_IPS: "127.0.0.1,172.19.0.0/24"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import http.client; conn = http.client.HTTPConnection(\"127.0.0.1\", ${APP_PORT:-8000}); conn.request(\"GET\", \"/health/readiness\"); resp = conn.getresponse(); exit(0) if resp.status == 200 else exit(1)'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1GB

networks:
  frontend:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/24
  backend:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/24


volumes:
  pg_data:
  redis_data:
