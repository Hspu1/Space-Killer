services:
  nginx:
    image: nginx:mainline-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/snippets:/etc/nginx/snippets:ro
      - ./deploy/nginx/error.html:/var/www/html/error.html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nginx -t && wget --spider --quiet http://127.0.0.1:80/healthz || exit 1",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: db
    shm_size: 2gb
    env_file: .env
    volumes:
      - ./deploy/postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
      - pg_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
          # cpus: "0.8"
          # memory: 4G
        reservations:
          cpus: "0.1"
          memory: 128M
          # cpus: "0.4"
          # memory: 2.5G
    restart: unless-stopped

  redis_app:
    image: redis:7.4-alpine
    container_name: redis_app
    volumes:
      - ./deploy/redis/redis_app.conf:/etc/redis/redis_app.conf:ro
      - redis_app_data:/data
    command:
      [
        "redis-server",
        "/etc/redis/redis_app.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      - net.core.somaxconn=2048  # tcp-backlog 2048
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6379 -a $$REDIS_PASSWORD ping | grep PONG || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          cpus: "0.7" # testing
          memory: 1G
        reservations:
          cpus: "0.7" # testing
          memory: 1G
    restart: unless-stopped
  
  redis_math:
    image: redis:7.4-alpine
    container_name: redis_math
    volumes:
      - ./deploy/redis/redis_math.conf:/etc/redis/redis_math.conf:ro
      - redis_math_data:/data
    command:
      [
        "redis-server",
        "/etc/redis/redis_math.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6380 -a $$REDIS_PASSWORD ping | grep PONG || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          cpus: "0.7" # testing
          memory: 1G
        reservations:
          cpus: "0.7" # testing
          memory: 1G
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: nats
    volumes:
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    environment:
      - NATS_USER=${NATS_USER}
      - NATS_PASSWORD=${NATS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      # resources:
      #   limits:
      #     cpus: "0.1" # !!!
      #     memory: "512M"
      #   reservations:
      #     cpus: "0.1"
      #     memory: "256M"
    restart: unless-stopped
  
  centrifugo:
    image: centrifugo/centrifugo:v6.7
    container_name: centrifugo
    volumes:
      - ./deploy/centrifugo/centrifugo.json:/etc/centrifugo/centrifugo.json:ro
      - centrifugo-data:/data
    command: ["centrifugo", "-c", "/etc/centrifugo/centrifugo.json"]
    environment:
      - CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY=${CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_HTTP_API_KEY}
      - CENTRIFUGO_ADMIN_ENABLED=true
      - CENTRIFUGO_ADMIN_PASSWORD=${CENTRIFUGO_ADMIN_PASSWORD}
      - CENTRIFUGO_ADMIN_SECRET=${CENTRIFUGO_ADMIN_SECRET}

      - CENTRIFUGO_ENGINE_TYPE=redis
      - CENTRIFUGO_ENGINE_REDIS_ADDRESS=redis_math:6380
      - CENTRIFUGO_ENGINE_REDIS_PASSWORD=${REDIS_PASSWORD}
      - CENTRIFUGO_ENGINE_REDIS_DB=${CENTRIFUGO_ENGINE_REDIS_DB}
    depends_on:
      redis_math:
        condition: service_healthy
    networks:
      - frontend
      - backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.6" # testing
          memory: 1G
        reservations:
          cpus: "0.6" # testing
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped

  migrator:
    build:
      context: .
    image: custom-app-image:latest
    container_name: migrator
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  app:
    build:
      context: .
      args:
        - APP_PORT=${APP_PORT:-8000}
    image: custom-app-image:latest
    container_name: app
    env_file: .env
    environment:
      GRANIAN_PROXY_HEADERS: "true"
      GRANIAN_FORWARDED_ALLOW_IPS: "127.0.0.1,172.19.0.0/24"
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_HTTP_API_KEY}
    depends_on:
      migrator:
        condition: service_completed_successfully  # hence, db is also healthy
      redis_app:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import http.client; conn = http.client.HTTPConnection("127.0.0.1", ${APP_PORT:-8000}); conn.request("GET", "/health/readiness"); resp = conn.getresponse(); exit(0) if resp.status == 200 else exit(1)''',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 8G
    #     reservations:
    #       cpus: "2"
    #       memory: 8G
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/24
  backend:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/24

volumes:
  pg_data:
    driver: local
  redis_app_data:
    driver: local
  redis_math_data:
    driver: local
  nats-data:
    driver: local
  centrifugo-data:
    driver: local
