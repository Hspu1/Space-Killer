# 2-core CPU: nginx(0.1) + db(0.8) + redis(0.2) + nats(0.3) + centrifugo(0.1) + app(0.5) => using 2/2 vCPU
# 8GB RAM: nginx(128MB) + db(4GB) + redis(768MB) + nats(512MB) + centrifugo(128MB) + app(1.5GB) => using 7/8 GB
services:
  nginx:
    image: nginx:mainline-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/snippets:/etc/nginx/snippets:ro
      - ./deploy/nginx/error.html:/var/www/html/error.html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nginx -t && wget --spider --quiet http://127.0.0.1:80/healthz || exit 1",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: db
    shm_size: 2gb
    env_file: .env
    volumes:
      - ./deploy/postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
      - pg_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 4G
        reservations:
          cpus: "0.4"
          memory: 2.5G
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: redis
    volumes:
      - ./deploy/redis/redis.conf:/etc/redis/redis.conf:ro
      - redis_data:/data
    command:
      [
        "redis-server",
        "/etc/redis/redis.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a $$REDIS_PASSWORD ping | grep PONG || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 768M
        reservations:
          cpus: "0.1"
          memory: 640M
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: nats
    volumes:
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    environment:
      - NATS_USER=${NATS_USER}
      - NATS_PASSWORD=${NATS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: "512M"
        reservations:
          cpus: "0.1"
          memory: "256M"
    restart: unless-stopped
  
  centrifugo:
    image: centrifugo/centrifugo:v6.7
    container_name: centrifugo
    volumes:
      - ./deploy/centrifugo/centrifugo.json:/etc/centrifugo/centrifugo.json:ro
      - centrifugo-data:/data
    command: ["centrifugo", "-c", "/etc/centrifugo/centrifugo.json"]
    environment:
      - CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY=${CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_HTTP_API_KEY}
      - CENTRIFUGO_ADMIN_PASSWORD=${CENTRIFUGO_ADMIN_PASSWORD}
      - CENTRIFUGO_ADMIN_SECRET=${CENTRIFUGO_ADMIN_SECRET}

      - CENTRIFUGO_ENGINE_TYPE=redis
      - CENTRIFUGO_ENGINE_REDIS_ADDRESS=redis:6379
      - CENTRIFUGO_ENGINE_REDIS_PASSWORD=${REDIS_PASSWORD}
      - CENTRIFUGO_ENGINE_REDIS_DB=${CENTRIFUGO_ENGINE_REDIS_DB}

      - CENTRIFUGO_BROKER_ENABLED=true
      - CENTRIFUGO_BROKER_TYPE=nats
      - CENTRIFUGO_BROKER_NATS_URL=nats://${NATS_USER}:${NATS_PASSWORD}@nats:4222
      - CENTRIFUGO_BROKER_NATS_RAW_MODE_ENABLED=true
      - CENTRIFUGO_BROKER_NATS_RAW_MODE_PREFIX=skyfield.
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          memory: 64M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped

  migrator:
    build:
      context: .
    image: custom-app-image:latest
    container_name: migrator
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  app:
    build:
      context: .
      args:
        - APP_PORT=${APP_PORT:-8000}
    image: custom-app-image:latest
    container_name: app
    volumes:
      - .:/app
      - /app/.venv
    env_file: .env
    environment:
      GRANIAN_PROXY_HEADERS: "true"
      GRANIAN_FORWARDED_ALLOW_IPS: "127.0.0.1,172.19.0.0/24"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import http.client; conn = http.client.HTTPConnection("127.0.0.1", ${APP_PORT:-8000}); conn.request("GET", "/health/readiness"); resp = conn.getresponse(); exit(0) if resp.status == 200 else exit(1)''',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1.5G
        reservations:
          cpus: "0.25"
          memory: 1G
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/24
  backend:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/24

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  nats-data:
    driver: local
  centrifugo-data:
    driver: local
