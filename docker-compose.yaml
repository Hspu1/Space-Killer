name: space-killer

services:
  angie:
    image: docker.angie.software/angie:1.11.5-alpine
    container_name: angie
    user: root
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/angie/angie.conf:/etc/angie/angie.conf:ro
      - ./deploy/angie/conf.d:/etc/angie/conf.d:ro
      - ./deploy/angie/snippets:/etc/angie/snippets:ro
      - ./deploy/angie/error.html:/etc/angie/error.html:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
      geo:
        condition: service_started
    networks:
      - frontend
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://127.0.0.1:80/healthz || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    oom_score_adj: -500
    cpuset: "1"

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: db
    shm_size: 2560mb # shared memory size + reserve
    volumes:
      - ./deploy/postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
      - pg_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3.5G
        reservations:
          memory: 3.5G
    restart: unless-stopped
    oom_score_adj: -500
    cpuset: "5,6"

  db_migrator:
    build:
      context: .
      dockerfile: deploy/app/Dockerfile
    container_name: db_migrator
    env_file: .env
    command: ["alembic", "-c", "deploy/alembic/alembic.ini", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
    restart: on-failure:3
    cpuset: "0"

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pgbouncer
    env_file: .env
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}

      - POOL_MODE=${PGBOUNCER_POOL_MODE}
      - MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN}
      - DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE}
      - MIN_POOL_SIZE=${PGBOUNCER_MIN_POOL_SIZE}
      - RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE}
      - SERVER_IDLE_TIMEOUT=${PGBOUNCER_SERVER_IDLE_TIMEOUT}
      - AUTH_TYPE=${PGBOUNCER_AUTH_TYPE}
    depends_on:
      db:
        condition: service_healthy
      db_migrator:
        condition: service_completed_successfully
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    oom_score_adj: -500
    cpuset: "1"

  scylla:
    image: scylladb/scylla:2026.2.0-rc2
    container_name: scylla
    cap_add:
      - IPC_LOCK
      - SYS_NICE
      - SYS_RESOURCE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    ulimits:
      memlock:
        soft: -1
        hard: -1
    command: --smp=1 --memory=4831838208 --reserve-memory=536870912 --developer-mode=1 --overprovisioned=0 --reactor-backend=io_uring --blocked-reactor-notify-ms=250 --io-properties-file=/etc/scylla.d/io_properties.yaml
    volumes:
      - ./deploy/scylla/scylla.yaml:/etc/scylla/scylla.yaml:ro
      - ./deploy/scylla/cassandra-rackdc.properties:/etc/scylla/cassandra-rackdc.properties:ro
      - ./deploy/scylla/io_properties.yaml:/etc/scylla.d/io_properties.yaml:ro
      - /mnt/nvme/scylla/data:/var/lib/scylla
    networks:
      - backend
    ports:
      - "127.0.0.1:9180:9180"
    deploy:
      resources:
        limits:
          memory: 5.5G
        reservations:
          memory: 5.5G
    restart: unless-stopped
    oom_score_adj: -500
    cpuset: "7"

  scylla_migrator:
    image: migrate/migrate:v4.17.1
    container_name: scylla_migrator
    depends_on:
      scylla:
        condition: service_started
    volumes:
      - ./src/infra/scylla/migrations:/migrations
    command:
      - -path=/migrations
      - -database=cassandra://scylla:9042/content_service?x-multi-statement=true
      - up
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    restart: on-failure:3
    cpuset: "0"

  redis_app:
    image: redis:7.4-alpine
    container_name: redis_app
    volumes:
      - ./deploy/redis/redis_app.conf:/etc/redis/redis_app.conf:ro
      - redis_app_data:/data
    command:
      [
        "redis-server",
        "/etc/redis/redis_app.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    env_file: .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      - net.core.somaxconn=2048
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6379 -a $$REDIS_PASSWORD ping | grep PONG || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 1G
    restart: unless-stopped
    oom_score_adj: -500
    cpuset: "2"

  redis_geo:
    image: redis:7.4-alpine
    container_name: redis_geo
    volumes:
      - ./deploy/redis/redis_geo.conf:/etc/redis/redis_geo.conf:ro
    command:
      [
        "redis-server",
        "/etc/redis/redis_geo.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    env_file: .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      - net.core.somaxconn=2048
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6380 -a $$REDIS_PASSWORD ping | grep PONG || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M
    restart: unless-stopped
    oom_score_adj: -300
    cpuset: "3"

  centrifugo:
    image: centrifugo/centrifugo:v6.7
    container_name: centrifugo
    volumes:
      - ./deploy/centrifugo/centrifugo.json:/etc/centrifugo/centrifugo.json:ro
    command: ["centrifugo", "-c", "/etc/centrifugo/centrifugo.json"]
    env_file: .env
    environment:
      - CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY=${CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_HTTP_API_KEY}
      - CENTRIFUGO_ADMIN_ENABLED=true
      - CENTRIFUGO_ADMIN_PASSWORD=${CENTRIFUGO_ADMIN_PASSWORD}
      - CENTRIFUGO_ADMIN_SECRET=${CENTRIFUGO_ADMIN_SECRET}

      - CENTRIFUGO_ENGINE_TYPE=redis
      - CENTRIFUGO_ENGINE_REDIS_ADDRESS=redis_geo:6380
      - CENTRIFUGO_ENGINE_REDIS_PASSWORD=${REDIS_PASSWORD}
      - CENTRIFUGO_ENGINE_REDIS_DB=${CENTRIFUGO_ENGINE_REDIS_DB}
    depends_on:
      redis_geo:
        condition: service_healthy
    networks:
      - backend
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 512M
    restart: unless-stopped
    oom_score_adj: -300
    cpuset: "4"

  geo:
    build:
      context: .
      dockerfile: deploy/geo/Dockerfile
    container_name: geo
    env_file: .env
    environment:
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_HTTP_API_KEY}
    depends_on:
      redis_geo:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 0.5G
        reservations:
          memory: 0.5G
    restart: unless-stopped
    oom_score_adj: -200
    cpuset: "3,4"

  app:
    build:
      context: .
      dockerfile: deploy/app/Dockerfile
      args:
        - APP_PORT=${APP_PORT:-8000}
    container_name: app
    env_file: .env
    environment:
      GRANIAN_PROXY_HEADERS: "true"
      GRANIAN_FORWARDED_ALLOW_IPS: "127.0.0.1,172.19.0.0/24"
    depends_on:
      db:
        condition: service_healthy
      db_migrator:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis_app:
        condition: service_healthy
      nats:
        condition: service_healthy
      # HUH - wb other container nig
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import http.client; conn = http.client.HTTPConnection("127.0.0.1", ${APP_PORT}); conn.request("GET", "/health/readiness"); resp = conn.getresponse(); exit(0) if resp.status == 200 else exit(1)''',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 1G
    restart: unless-stopped
    oom_score_adj: -200
    cpuset: "2"

  nats:
    image: nats:2.10-alpine
    container_name: nats
    volumes:
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf:ro
    env_file: .env
    environment:
      - NATS_USER=${NATS_USER}
      - NATS_PASSWORD=${NATS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    oom_score_adj: -500
    cpuset: "0"

  sw_master_1:
    image: chrislusf/seaweedfs:4.28
    container_name: sw_master_1
    volumes:
      - /mnt/nvme/seaweed/meta:/data/meta
    networks:
      - backend
    command: >
      master
      -ip=sw_master_1
      -ip.bind=0.0.0.0
      -port=9333
      -mdir=/data/meta
      -volumeSizeLimitMB=4096
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    cpuset: "0"

  sw_volume_1:
    image: chrislusf/seaweedfs:4.28
    container_name: sw_volume_1
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /mnt/nvme/seaweed/blobs:/data/blobs
    env_file: .env
    environment:
      - GOMAXPROCS=1
      - GOGC=300
      - GOMEMLIMIT=700MiB
    networks:
      - backend
    command: >
      volume
      -mserver=sw_master_1:9333
      -ip=sw_volume_1
      -ip.bind=0.0.0.0
      -port=8080
      -dir=/data/blobs
      -max=25
      -index=leveldb
      -fileSizeLimitMB=25
      -disk=ssd
      -minFreeSpace=5GiB
    deploy:
      resources:
        limits:
          memory: 850M
        reservations:
          memory: 256M
    restart: unless-stopped
    oom_score_adj: -100
    cpu_shares: 512
    cpuset: "0"

networks:
  frontend:
    driver: bridge
    enable_ipv6: false
  backend:
    driver: bridge
    enable_ipv6: false

volumes:
  pg_data:
    driver: local
  redis_app_data:
    driver: local
