name: space-killer

services:
  nginx:
    image: nginx:mainline-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/snippets:/etc/nginx/snippets:ro
      - ./deploy/nginx/error.html:/etc/nginx/error.html:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
      geo:
        condition: service_started
    networks:
      - frontend
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://127.0.0.1:80/healthz || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: db
    shm_size: 2gb # shared memory size, 25% of memory
    env_file: .env
    volumes:
      - ./deploy/postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
      - pg_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 8G
    restart: unless-stopped

  migrator:
    build:
      context: .
      dockerfile: deploy/app/Dockerfile
    container_name: migrator
    env_file: .env
    command: ["alembic", "-c", "deploy/alembic/alembic.ini", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: on-failure:3

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pgbouncer
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}

      - POOL_MODE=${PGBOUNCER_POOL_MODE}
      - MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN}
      - DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE}
      - MIN_POOL_SIZE=${PGBOUNCER_MIN_POOL_SIZE}
      - RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE}
      - SERVER_IDLE_TIMEOUT=${PGBOUNCER_SERVER_IDLE_TIMEOUT}
      - AUTH_TYPE=${PGBOUNCER_AUTH_TYPE}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  redis_app:
    image: redis:7.4-alpine
    container_name: redis_app
    volumes:
      - ./deploy/redis/redis_app.conf:/etc/redis/redis_app.conf:ro
      - redis_app_data:/data
    command:
      [
        "redis-server",
        "/etc/redis/redis_app.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      - net.core.somaxconn=2048
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6379 -a $$REDIS_PASSWORD ping | grep PONG || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 2G
    restart: unless-stopped

  redis_geo:
    image: redis:7.4-alpine
    container_name: redis_geo
    volumes:
      - ./deploy/redis/redis_geo.conf:/etc/redis/redis_geo.conf:ro
    command:
      [
        "redis-server",
        "/etc/redis/redis_geo.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      - net.core.somaxconn=2048
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6380 -a $$REDIS_PASSWORD ping | grep PONG || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 7s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 32M
        reservations:
          cpus: "0.1"
          memory: 16M
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: nats
    volumes:
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf:ro
      # - nats_data:/data
    environment:
      - NATS_USER=${NATS_USER}
      - NATS_PASSWORD=${NATS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "0.5G"
    restart: unless-stopped

  centrifugo:
    image: centrifugo/centrifugo:v6.7
    container_name: centrifugo
    volumes:
      - ./deploy/centrifugo/centrifugo.json:/etc/centrifugo/centrifugo.json:ro
    command: ["centrifugo", "-c", "/etc/centrifugo/centrifugo.json"]
    environment:
      - CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY=${CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_HTTP_API_KEY}
      - CENTRIFUGO_ADMIN_ENABLED=true
      - CENTRIFUGO_ADMIN_PASSWORD=${CENTRIFUGO_ADMIN_PASSWORD}
      - CENTRIFUGO_ADMIN_SECRET=${CENTRIFUGO_ADMIN_SECRET}

      - CENTRIFUGO_ENGINE_TYPE=redis
      - CENTRIFUGO_ENGINE_REDIS_ADDRESS=redis_geo:6380
      - CENTRIFUGO_ENGINE_REDIS_PASSWORD=${REDIS_PASSWORD}
      - CENTRIFUGO_ENGINE_REDIS_DB=${CENTRIFUGO_ENGINE_REDIS_DB}
    depends_on:
      redis_geo:
        condition: service_healthy
    networks:
      - frontend # dev only (?)
      - backend
    ports:
      - "8000:8000" # dev only (?)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.2"
          memory: 256M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped

  geo:
    build:
      context: .
      dockerfile: deploy/geo/Dockerfile
    container_name: geo
    env_file: .env
    environment:
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_HTTP_API_KEY}
    depends_on:
      redis_geo:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 0.5G
        reservations:
          cpus: "1"
          memory: 0.5G
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: deploy/app/Dockerfile
      args:
        - APP_PORT=${APP_PORT:-8000}
    container_name: app
    env_file: .env
    environment:
      GRANIAN_PROXY_HEADERS: "true"
      GRANIAN_FORWARDED_ALLOW_IPS: "127.0.0.1,172.19.0.0/24"
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis_app:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import http.client; conn = http.client.HTTPConnection("127.0.0.1", ${APP_PORT:-8000}); conn.request("GET", "/health/readiness"); resp = conn.getresponse(); exit(0) if resp.status == 200 else exit(1)''',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 1G
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
    enable_ipv6: false
  backend:
    driver: bridge
    enable_ipv6: false

volumes:
  pg_data:
    driver: local
  redis_app_data:
    driver: local
  # nats_data:
  #   driver: local
# no jetstream yet
