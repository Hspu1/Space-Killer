brotli on;
brotli_static on;
brotli_comp_level 4;
brotli_min_length 256;

brotli_types
    text/plain
    text/css
    application/json
    application/javascript
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml
    image/x-icon
    application/vnd.ms-fontobject
    font/opentype
    font/otf
    font/ttf;
