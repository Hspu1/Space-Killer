proxy_hide_header X-Powered-By;
proxy_hide_header X-AspNet-Version;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "0" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://space-killer.com https://space-killer.com https://github.com https://api.github.com https://stackoverflow.com https://api.stackexchange.com https://telegram.org https://oauth.yandex.ru https://login.yandex.ru https://api.yandex.ru https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://openidconnect.googleapis.com; script-src 'self' 'unsafe-inline' https://telegram.org https://accounts.google.com https://apis.google.com https://yastatic.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://yastatic.net; img-src 'self' data: blob: https://space-killer.com https://*.githubusercontent.com https://*.googleusercontent.com https://*.yandex.net https://yastatic.net https://avatars.githubusercontent.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://telegram.org https://t.me https://accounts.google.com https://oauth.yandex.ru; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self' https://github.com https://accounts.google.com https://oauth.yandex.ru https://stackoverflow.com;" always;

location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* \.(conf|config|sql|log|sh|inc|swp|dist|bak|env|yaml|yml)$ {
    deny all;
    access_log off;
    log_not_found off;
}
