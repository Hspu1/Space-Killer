proxy_hide_header X-Powered-By;
proxy_hide_header X-AspNet-Version;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "0" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://space-killer.com https://space-killer.com https://unpkg.com https://telegram.org https://*.telegram.org https://googleapis.com https://*.googleapis.com https://yandex.ru https://*.yandex.ru https://github.com https://*.github.com https://stackoverflow.com https://*.stackoverflow.com; script-src 'self' 'unsafe-inline' https://unpkg.com https://telegram.org https://*.telegram.org https://googleapis.com https://*.googleapis.com https://yastatic.net https://*.yastatic.net https://yandex.ru https://*.yandex.ru https://github.com https://*.github.com https://stackoverflow.com https://*.stackoverflow.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.googleapis.com https://yastatic.net https://*.yastatic.net; img-src 'self' data: blob: https://space-killer.com https://*.githubusercontent.com https://*.googleusercontent.com https://*.yandex.net https://yastatic.net https://*.github.dev; font-src 'self' data: https://gstatic.com https://*.gstatic.com; frame-src 'self' https://telegram.org https://t.me https://*.telegram.org https://google.com https://*.googleapis.com https://yandex.ru https://*.yandex.ru; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self' https://github.com https://*.github.com https://google.com https://*.google.com https://google.com https://yandex.ru https://*.yandex.ru https://stackoverflow.com https://*.stackoverflow.com;" always;

location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* \.(conf|config|sql|log|sh|inc|swp|dist|bak|env|yaml|yml)$ {
    deny all;
    access_log off;
    log_not_found off;
}
