location ~ ^/uploads/ {
    limit_req zone=upload_shield burst=10 nodelay;

    client_max_body_size    21m;
    proxy_request_buffering off;
    proxy_buffering         off;

    proxy_pass http://seaweed_s3;

    proxy_read_timeout 10s;
    proxy_send_timeout 10s;
}

location ~* ^/media/.*\.(jpg|jpeg|png|webp|avif|ico)$ {
    limit_req zone=photo_shield burst=500 nodelay;

    rewrite ^/media/(.*) /$1 break;
    proxy_pass http://seaweed_filer;

    add_header Cache-Control "no-cache, must-revalidate" always;
    proxy_pass_header ETag;

    proxy_buffering   on;
    proxy_buffers     16 32k;
    proxy_buffer_size 32k;
}
