server {
    listen 80;
    server_name space-killer.com www.space-killer.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location / {
        return 301 https://space-killer.com$request_uri;
    }

    location /status {
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny  all;

        vhost_traffic_status_display;
        vhost_traffic_status_display_format html;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name space-killer.com www.space-killer.com;

    ssl_certificate     /etc/letsencrypt/live/space-killer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/space-killer.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    include conf.d/media.conf;
    include snippets/security.conf;
    # include snippets/error_page.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Cache-Status $upstream_cache_status always;

    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location /status {
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny  all;

        vhost_traffic_status_display;
        vhost_traffic_status_display_format html;
    }

    location /connection/websocket {
        limit_req  zone=ws_storm_shield burst=10 nodelay;
        limit_conn ws_conn_limit 5;

        proxy_pass http://centrifugo_server;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_cache_bypass      $http_upgrade;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        limit_req zone=api_flood_shield burst=50 nodelay;

        include snippets/proxy_params.conf;

        proxy_max_temp_file_size 0;

        proxy_pass http://app_server;
    }

    location = /favicon.ico {
        alias /var/www/static/favicon.ico;

        access_log off;
        log_not_found off;
        expires max;
        add_header Cache-Control "public, no-transform";
    }
}
