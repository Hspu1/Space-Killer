load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_headers_more_filter_module.so;
load_module modules/ngx_http_vhost_traffic_status_module.so;

user root;
worker_processes auto;
worker_rlimit_nofile 100000;

pid /var/run/angie.pid;

events {
    worker_connections 20480;
    use epoll;
    multi_accept on;
}

http {
    server_tokens off;
    more_set_headers 'Server: Space-Killer-Gateway';
    vhost_traffic_status_zone;

    upstream app_server {
        server app:8000;
        keepalive 64;
    }

    upstream centrifugo_server {
        server centrifugo:8000;
        keepalive 64;
    }

    include       /etc/angie/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_cache_path /var/cache/angie levels=1:2 keys_zone=my_api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    include snippets/optimization.conf;
    include snippets/gzip.conf;
    include snippets/brotli.conf;
    include snippets/rate_limiting.conf;

    include conf.d/*.conf;
}
