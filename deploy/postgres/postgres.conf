listen_addresses = '*'
port = 5432
max_connections = 150             # 300 для 4ГБ — это риск OOM. 150 + PGBouncer (если надо) — идеал.
password_encryption = scram-sha-256

shared_buffers = 1GB              # 25% RAM
work_mem = 8MB                    # 150 коннектов * 8МБ = безопасный предел
maintenance_work_mem = 512MB
huge_pages = off
effective_cache_size = 2GB

wal_level = replica               # minimal в PG 17 может не запуститься при дефолтном образе
wal_buffers = 16MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 8GB
min_wal_size = 2GB
synchronous_commit = local        # Максимальный FPS базы

effective_io_concurrency = 200    # Тюнинг под SSD

autovacuum = on
autovacuum_max_workers = 4
autovacuum_vacuum_scale_factor = 0.01
autovacuum_analyze_scale_factor = 0.005
autovacuum_vacuum_cost_limit = 1000

logging_collector = off           # Чтобы логи летели в `docker logs`
log_destination = 'stderr'
log_min_duration_statement = 250ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_line_prefix = '%m [%p] %u@%d ' # Твой кастомный префикс
