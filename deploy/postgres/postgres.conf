listen_addresses = '*'
port = 5432
password_encryption = scram-sha-256

# pgbouncer_default_pool_size is 4 (cores * 2) + huge reserve
# includes superuser_reserved_connections, max_wal_senders
max_connections = 20
# default for superuser_reserved_connections
superuser_reserved_connections = 3

shared_buffers = 1536MB
work_mem = 16MB
# might enable huge_pages
huge_pages = off
effective_cache_size = 2GB

# default for max_worker_processes
max_worker_processes = 8
# no parallelism on 2 cores
max_parallel_workers = 0
max_parallel_workers_per_gather = 0
max_parallel_maintenance_workers = 0

wal_compression = lz4
# for outbox
wal_level = logical
max_wal_senders = 3
# just in case
wal_buffers = 64MB
min_wal_size = 2GB
max_wal_size = 16GB

# no aggressive checkpointing
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# high intense
bgwriter_delay = 20ms
bgwriter_lru_maxpages = 100
# default cushion
bgwriter_lru_multiplier = 2.0


###########################################################
###########################################################
###########################################################
###########################################################
###########################################################










synchronous_commit = off
effective_io_concurrency = 1000
random_page_cost = 1.1

maintenance_work_mem = 256MB




autovacuum = on
autovacuum_max_workers = 1
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 2000
autovacuum_vacuum_cost_delay = 2

logging_collector = off
log_destination = 'stderr'
log_min_duration_statement = 67ms
log_checkpoints = on
deadlock_timeout = 200ms
log_lock_waits = on
log_connections = off
log_disconnections = off
log_line_prefix = '%m [%p] %u@%d '
# m -> time, p -> pid, u -> user, d -> db

statement_timeout = 5000
lock_timeout = 3000
idle_in_transaction_session_timeout = 10000
