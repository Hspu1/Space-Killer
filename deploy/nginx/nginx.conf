user nginx;
worker_processes auto;
worker_rlimit_nofile 100000;

pid /var/run/nginx.pid;

events {
    worker_connections 20480;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    include snippets/logging.conf;
    include snippets/optimization.conf;
    include snippets/gzip.conf;
    include snippets/rate_limiting.conf;

    include conf.d/*.conf;
}
