server {
    listen 80;  # 443
    # http2 on;
    server_name _;

    include snippets/security.conf;
    include snippets/optimization.conf;
    include snippets/proxy_params.conf;
    include snippets/error_page.conf;

    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location /ws/ {
        limit_req zone=ws_storm_shield burst=10 nodelay;
        limit_conn ws_conn_limit 50;

        proxy_pass http://api_server;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        limit_req zone=api_flood_shield burst=50 nodelay;

        include snippets/api_cache.conf;

        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
