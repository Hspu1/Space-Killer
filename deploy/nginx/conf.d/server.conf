server {
    listen 80;
    server_name space-killer.com www.space-killer.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location / {
        return 301 https://space-killer.com;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name space-killer.com www.space-killer.com;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    ssl_certificate /etc/letsencrypt/live/space-killer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/space-killer.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    include snippets/security.conf;
    include snippets/optimization.conf;
    include snippets/proxy_params.conf;
    # include snippets/error_page.conf;

    location /healthz {
        access_log off;
        allow 127.0.0.1;
        deny all;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location /connection/websocket {
        limit_req zone=ws_storm_shield burst=10 nodelay;
        limit_conn ws_conn_limit 50;

        proxy_pass http://centrifugo_server;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        limit_req zone=api_flood_shield burst=50 nodelay;

        include snippets/api_cache.conf;
        include snippets/proxy_params.conf;

        proxy_pass http://app_server;
        proxy_set_header Connection "";
    }
}
