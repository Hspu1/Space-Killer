port 6379
bind 0.0.0.0
tcp-backlog 65535
tcp-keepalive 300

maxmemory 512mb
maxmemory-policy allkeys-lru

save ""
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

maxclients 10000
slowlog-log-slower-than 10000
slowlog-max-len 128

protected-mode yes
