port 6379
bind 0.0.0.0
protected-mode yes

tcp-backlog 2048
maxclients 10000
tcp-keepalive 300

maxmemory 600mb
maxmemory-policy allkeys-lru

appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb

loglevel notice

slowlog-log-slower-than 10000
slowlog-max-len 128

protected-mode yes
