port: 4222
http_port: 8222
server_name: "nuts1"

max_payload: 512KB
max_connections: 1000
write_deadline: "5s" 
max_pending: 16MB 
max_control_line: 1024

jetstream {
    store_dir: /data/jetstream
    max_memory_store: 256MB
    max_file_store: 1GB
}

ping_interval: "5s"
ping_max: 2
lame_duck_duration: "30s"

logtime: true
debug: false
trace: false
