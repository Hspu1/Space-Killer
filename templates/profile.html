<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>{{ nickname }} (@{{ username }}) - Space-Killer</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --neon-green: #32d69f;
            --neon-glow: rgba(50, 214, 159, 0.85);
            --neon-orange: #ff5722;
            --neon-orange-glow: rgba(255, 87, 34, 0.5);
            --white-alpha: rgba(255, 255, 255, 0.2);
            --neon-pink: #ff007f;
            --neon-pink-glow: rgba(203, 0, 122, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #777777;
            --text-muted: #444444;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px 32px;
            border-bottom: 1px solid #333333;
        }

        .back-button {
            position: absolute;
            left: 24px;
            top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: transparent;
            border: 1px solid var(--white-alpha);
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .back-button:hover {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 8px rgba(50, 214, 159, 0.3);
        }

        .back-button svg { width: 20px; height: 20px; }

        .avatar-container { margin-bottom: 16px; }

        .avatar-box {
            width: 140px;
            height: 140px;
            background-color: var(--bg-dark);
            border: 1px solid var(--white-alpha);
            border-radius: 4px;
        }

        .avatar-box:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink-glow);
        }

        .username-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .username {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-align: center;
        }

        .edit-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            color: var(--neon-green);
            background: rgba(50, 214, 159, 0.05);
            border: 1px solid rgba(50, 214, 159, 0.3);
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .username-row:hover .edit-icon {
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 0 12px var(--neon-glow), inset 0 0 8px rgba(50, 214, 159, 0.2);
            border-color: var(--neon-green);
        }

        .edit-icon svg {
            width: 18px;
            height: 18px;
            filter: drop-shadow(0 0 4px var(--neon-green));
            transition: filter 0.3s ease;
        }

        .edit-icon:hover {
            background: rgba(50, 214, 159, 0.15);
            box-shadow: 0 0 20px var(--neon-glow), inset 0 0 12px rgba(50, 214, 159, 0.3);
            transform: scale(1.1) !important;
        }

        .edit-icon:hover svg {
            filter: drop-shadow(0 0 8px var(--neon-green));
        }

        .nickname {
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }

        .bio {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            text-align: center;
            max-width: 520px;
            min-height: 24px;
        }

        .bio-placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        #profile-editable {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        #profile-editable form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #profile-editable.htmx-swapping {
            opacity: 0.6;
        }

        .loading-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            color: var(--neon-green);
            font-size: 13px;
            margin-top: 12px;
        }

        .loading-indicator.htmx-request {
            display: flex;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(50, 214, 159, 0.3);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .edit-input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--white-alpha);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 10px 12px;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .edit-input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 0 3px rgba(50, 214, 159, 0.15);
        }

        .edit-input--nickname {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .edit-input--bio {
            resize: vertical;
            min-height: 80px;
            max-height: 200px;
            line-height: 1.5;
            text-align: center;
        }

        .edit-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }

        .btn-save, .btn-cancel {
            all: unset;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--white-alpha);
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        .btn-save:hover {
            box-shadow: 0 0 8px rgba(50, 214, 159, 0.3);
        }

        .btn-cancel {
            border-color: var(--neon-orange);
            color: var(--neon-orange);
        }

        .btn-cancel:hover {
            box-shadow: 0 0 8px rgba(255, 87, 34, 0.2);
        }

        .error-message {
            color: var(--neon-orange);
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        .edit-input.error {
            border-color: var(--neon-orange);
        }

        .back-button:focus-visible,
        .edit-icon:focus-visible,
        .btn-save:focus-visible,
        .btn-cancel:focus-visible,
        .edit-input:focus-visible {
            outline: 2px solid var(--neon-green);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

<div class="profile-header">
    <a href="javascript:history.back()" class="back-button" aria-label="Go back">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
    </a>

    <div class="avatar-container">
        {% if is_own_profile %}
        <label for="avatar-input" style="cursor: pointer;">
        {% endif %}

        <div id="avatar-box"
             class="avatar-box"
             {% if avatar_url %}
             style="background-image: url('{{ avatar_url }}'); background-size: cover; background-position: center;"
             {% endif %}>
        </div>

        {% if is_own_profile %}
        </label>

        <input id="avatar-input" type="file" accept="image/*" style="display: none;"
               hx-post="/profile/avatar/upload"
               hx-target="#avatar-box"
               hx-swap="outerHTML"
               hx-encoding="multipart/form-data"
               name="file">

        <div id="avatar-remove-wrapper" style="margin-top: 6px;">
            {% if avatar_url %}
            <button hx-delete="/profile/avatar"
                    hx-target="#avatar-box"
                    hx-swap="outerHTML"
                    hx-confirm="Remove avatar?"
                    class="btn-cancel"
                    style="font-size: 12px; padding: 4px 12px;">
                Remove
            </button>
            {% endif %}
        </div>
        {% endif %}
    </div>

    <div class="username-row">
        <span class="username">@{{ username }}</span>
        {% if is_own_profile %}
            <button class="edit-icon"
                    hx-get="/profile/edit/inline"
                    hx-target="#profile-editable"
                    hx-swap="innerHTML"
                    hx-indicator=".loading-indicator"
                    aria-label="Edit profile">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </button>
        {% endif %}
    </div>

    <div id="profile-editable">
        {% if not editing %}
            <div class="nickname">{{ nickname }}</div>
            <div class="bio">
                {% if bio %}
                    {{ bio }}
                {% else %}
                    <span class="bio-placeholder">No bio yet</span>
                {% endif %}
            </div>
        {% endif %}
    </div>

    <div class="loading-indicator">
        <div class="spinner"></div>
        <span>Saving...</span>
    </div>
</div>

<div class="profile-content">
</div>

<script>
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'profile-editable') {
            const input = evt.detail.target.querySelector('.edit-input');
            if (input) {
                input.focus();
                if (input.classList.contains('edit-input--nickname') && input.value) {
                    input.select();
                }
            }
        }
    });
</script>
</body>
</html>
