{% extends 'base.html' %}

{% block title %}Space-Killer{% endblock %}
{% block main_class %}page-center{% endblock %}
{% block body %}
    {% if user %}
        <h1 class="glow-text">Welcome, {{ user.name }}</h1>
        <a hx-get="/feed/global"
            hx-target="body"
            hx-push-url="true"
            role="button"
            class="login-btn"
            style="cursor: pointer; text-decoration: none;">
            Dive in!
        </a>
    {% endif %}
{% endblock %}
