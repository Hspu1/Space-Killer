{% extends 'base.html' %}
{% block title %}Space-Killer — Global{% endblock %}
{% block body %}
<style>
    main {
        padding: 0 !important;
        display: block !important;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    .center-container {
        display: block !important;
        max-width: none !important;
        gap: 0 !important;
        width: 100% !important;
        height: 100% !important;
    }

    body > footer {
        display: none !important;
    }

    :root {
        --neon-glow-sharp: rgba(50, 214, 159, 0.6);
        --neon-orange: #ff5722;
        --neon-orange-glow: rgba(255, 87, 34, 0.4);
    }

    .feed-layout {
        display: grid;
        grid-template-columns: 240px 1fr 280px;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
    }

    .sidebar {
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background-color: var(--bg-dark);
    }

    .neon-divider-left {
        border-right: 4px solid var(--neon-green);
        box-shadow: 6px 0 20px var(--neon-glow-sharp), 2px 0 5px #fff;
    }

    .neon-divider-right {
        border-left: 4px solid var(--neon-green);
        box-shadow: -6px 0 20px var(--neon-glow-sharp), -2px 0 5px #fff;
    }

    .feed-main {
        background-color: transparent;
    }

    .control-box {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 16px;
        width: 100%;
    }

    .sidebar-btn {
        all: unset;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: transparent;
        color: #777777;
        border: 1px solid var(--white-alpha);
        padding: 10px 20px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease;
        cursor: pointer;
        width: fit-content;
    }

    .btn-logout:hover {
        border-color: var(--neon-orange);
        color: var(--neon-orange);
        box-shadow: 0 0 15px var(--neon-orange-glow);
        text-shadow: 0 0 5px var(--neon-orange-glow);
    }

    .brand-text {
        color: #555555;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .btn-oss {
        color: var(--neon-green);
        text-decoration: none;
        text-shadow: 0 0 8px var(--neon-alpha);
        font-weight: 600;
        transition: all 0.2s ease;
    }

    .btn-oss:hover {
        filter: brightness(1.2);
        text-shadow: 0 0 15px var(--neon-alpha);
    }
</style>

<div class="feed-layout">
    <aside class="sidebar neon-divider-left">
        <div></div>
    </aside>

    <main class="feed-main"></main>

    <aside class="sidebar neon-divider-right">
        <div></div>

        <div class="control-box">
            <button hx-post="/auth/logout" class="sidebar-btn btn-logout">
                Log out
            </button>
            <div class="brand-text">
                <span>© 2026 Space-killer /</span>
                <a href="https://github.com/Hspu1/Space-Killer" target="_blank" class="btn-oss">OSS</a>
            </div>
        </div>
    </aside>
</div>
{% endblock %}
