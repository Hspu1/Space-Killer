<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Space-Killer</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --neon-green: #32d69f;
            --neon-glow: rgba(50, 214, 159, 0.85);
            --neon-glow-blur: rgba(50, 214, 159, 0.4);
            --neon-orange: #ff5722;
            --neon-orange-glow: rgba(255, 87, 34, 0.5);
            --white-alpha: rgba(255, 255, 255, 0.2);
            --neon-pink: #ff007f;
            --neon-pink-glow: rgba(203, 0, 122, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        svg {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .feed-layout {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            height: 100%;
        }

        .neon-divider-left::after,
        .neon-divider-right::after {
            content: '';
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: #333333;
        }

        .neon-divider-left::after  { right: 0; }
        .neon-divider-right::after { left: 0; }

        .feed-main {
            background-color: transparent;
            height: 100%;
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            margin-top: 16px;
        }

       .avatar-box {
            width: 140px;
            height: 140px;
            background-color: var(--bg-dark);
            border: 1px solid var(--white-alpha);
            border-radius: 4px;
            overflow: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-box:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink-glow);
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .username-text {
            color: #777777;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-align: center;
        }

        .control-box {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .sidebar-btn {
            all: unset;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: #777777;
            border: 1px solid var(--white-alpha);
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            width: fit-content;
        }

        .btn-logout:hover {
            border-color: var(--neon-orange);
            color: var(--neon-orange);
            box-shadow: 0 0 8px rgba(255, 87, 34, 0.2);
            text-shadow: 0 0 4px rgba(255, 87, 34, 0.3);
        }

        .brand-text {
            color: #444444;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-oss {
            color: #555555;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-oss:hover {
            color: var(--neon-green);
            text-shadow: 0 0 6px rgba(50, 214, 159, 0.35);
        }
    </style>
</head>
<body>

<div class="feed-layout">
    <aside class="sidebar neon-divider-left">
        <div></div>
    </aside>

    <div class="feed-main"></div>

    <aside class="sidebar neon-divider-right">
        <div class="profile-container">
            <a href="/profile/get/{{ username }}" style="display: block; text-decoration: none;">
                <div class="avatar-box">
                    {% if avatar_url %}
                        <img src="{{ avatar_url }}" alt="{{ username }}" width="140" height="140" loading="eager" decoding="sync">
                    {% endif %}
                </div>
            </a>
            <div class="username-text">{{ username }}</div>
        </div>

        <div class="control-box">
            <button hx-post="/auth/logout" class="sidebar-btn btn-logout">
                Log out
            </button>
            <div class="brand-text">
                <span>© 2026 Space-Killer /</span>
                <a href="https://github.com/Hspu1/Space-Killer" target="_blank" class="btn-oss">OSS</a>
            </div>
        </div>
    </aside>
</div>
</body>
</html>
