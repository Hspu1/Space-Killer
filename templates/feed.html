<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space-Killer — Global Feed</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --neon-green: #32d69f;
            --neon-glow: rgba(50, 214, 159, 0.85);
            --neon-glow-blur: rgba(50, 214, 159, 0.4);
            --neon-orange: #ff5722;
            --neon-orange-glow: rgba(255, 87, 34, 0.5);
            --white-alpha: rgba(255, 255, 255, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .feed-layout {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            height: 100%;
        }

        .neon-divider-left::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
            background-color: #ffffff;
            border-radius: 3px;
            box-shadow:
                0 0 4px #ffffff,
                4px 0 12px var(--neon-glow),
                8px 0 25px var(--neon-glow),
                12px 0 50px var(--neon-glow-blur);
        }

        .neon-divider-right::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background-color: #ffffff;
            border-radius: 3px;
            box-shadow:
                0 0 4px #ffffff,
                -4px 0 12px var(--neon-glow),
                -8px 0 25px var(--neon-glow),
                -12px 0 50px var(--neon-glow-blur);
        }

        .feed-main {
            background-color: transparent;
            height: 100%;
        }

        .control-box {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .sidebar-btn {
            all: unset;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: #777777;
            border: 1px solid var(--white-alpha);
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            width: fit-content;
        }

        .btn-logout:hover {
            border-color: var(--neon-orange);
            color: var(--neon-orange);
            box-shadow: 0 0 8px rgba(255, 87, 34, 0.2);
            text-shadow: 0 0 4px rgba(255, 87, 34, 0.3);
        }

        .brand-text {
            color: #444444;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-oss {
            color: #555555;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-oss:hover {
            color: var(--neon-green);
            text-shadow: 0 0 6px rgba(50, 214, 159, 0.35);
        }
    </style>
</head>
<body>

<div class="feed-layout">
    <aside class="sidebar neon-divider-left">
        <div></div>
    </aside>

    <div class="feed-main"></div>

    <aside class="sidebar neon-divider-right">
        <div></div>

        <div class="control-box">
            <button hx-post="/auth/logout" class="sidebar-btn btn-logout">
                Log out
            </button>
            <div class="brand-text">
                <span>© 2026 Space-killer /</span>
                <a href="https://github.com/Hspu1/Space-Killer" target="_blank" class="btn-oss">OSS</a>
            </div>
        </div>
    </aside>
</div>
</body>
</html>
