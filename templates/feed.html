{% extends 'base.html' %}
{% block title %}Space-Killer{% endblock %}
{% block body %}
<style>
    .feed-layout {
        display: grid;
        grid-template-columns: 240px 1fr 280px;
        width: 100vw;
        min-height: calc(100vh - 70px);
        margin: 0;
        padding: 0;
        position: absolute;
        top: 0;
        left: 0;
    }

    .sidebar {
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .neon-divider-left {
        border-right: 1px solid var(--neon-green);
        box-shadow: 4px 0 15px var(--neon-glow);
    }

    .neon-divider-right {
        border-left: 1px solid var(--neon-green);
        box-shadow: -4px 0 15px var(--neon-glow);
    }

    .feed-main {
        padding: 40px;
        overflow-y: auto;
    }

    .control-box {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 16px;
        width: 100%;
    }

    .sidebar-btn {
        all: unset;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: transparent;
        color: #777777;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px 20px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease;
        cursor: pointer;
        text-decoration: none;
        width: fit-content;
    }

    .btn-logout {
        border-color: rgba(255, 255, 255, 0.1);
    }
    .btn-logout:hover {
        border-color: #ff5722;
        color: #ff5722;
        box-shadow: 0 0 15px rgba(255, 87, 34, 0.2);
    }

    .brand-text {
        color: #555555;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .btn-oss {
        color: inherit;
        text-decoration: none;
        transition: all 0.2s ease;
    }
    .btn-oss:hover {
        color: var(--neon-green);
        text-shadow: 0 0 10px var(--neon-alpha);
    }
</style>

<div class="feed-layout">
    <aside class="sidebar neon-divider-left">
        <div></div>
    </aside>

    <section class="feed-main">
        <h1 class="glow-text" style="font-size: 36px; text-align: left; margin-bottom: 32px;">Global Feed</h1>
        <div id="posts-stream">
            <div style="color: #444; font-size: 14px; border: 1px dashed rgba(255,255,255,0.1); padding: 40px; border-radius: 4px; text-align: center;">
                [ Transmission standby. Feed content is muted for maintenance ]
            </div>
        </div>
    </section>

    <aside class="sidebar neon-divider-right">
        <div></div>

        <div class="control-box">
            <button hx-post="/auth/logout" class="sidebar-btn btn-logout">
                Log out
            </button>
            <div class="brand-text">
                <span>© 2026 Space-killer /</span>
                <a href="https://github.com/Hspu1/Space-Killer" target="_blank" class="btn-oss">OSS</a>
            </div>
        </div>
    </aside>
</div>
{% endblock %}
