<form hx-patch="/profile/edit/save"
      hx-target="#profile-editable"
      hx-swap="innerHTML">

    <input type="text"
           name="nickname"
           class="edit-input edit-input--nickname {% if errors %}error{% endif %}"
           value="{{ nickname }}"
           required>

    <textarea name="bio"
              class="edit-input edit-input--bio"
              placeholder="Tell us about yourself...">{{ bio if bio else '' }}</textarea>

    {% if errors %}
        {% for error in errors %}
            <div class="error-message">{{ error }}</div>
        {% endfor %}
    {% endif %}

    <div class="edit-actions">
        <button type="submit" class="btn-save">Save</button>
        <button type="button"
                class="btn-cancel"
                hx-get="/profile/view/inline"
                hx-target="#profile-editable"
                hx-swap="innerHTML">Cancel</button>
    </div>
</form>
