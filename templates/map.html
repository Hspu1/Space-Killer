<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
             integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
             crossorigin=""/>
        <style>
                body, html { margin: 0; padding: 0; height: 100%; background: #000; }
                #map { width: 100%; height: 100vh; }
                .leaflet-control-attribution { font-size: 10px !important; }
            </style>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
             integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
             crossorigin=""></script>
    </head>
    <body>
        <div id="map"></div>
        <script>
          var southWest = L.latLng(-89.9, -180);
          var northEast = L.latLng(89.9, 180);
          var bounds = L.latLngBounds(southWest, northEast);

          var map = L.map('map', {
              zoomControl: true,
              attributionControl: true,
              minZoom: 3,
              maxBounds: bounds,         // Запрещаем уходить за границы мира
              maxBoundsViscosity: 1.0    // Делаем границы "твердыми" (не пружинят)
          }).setView([35, 10], 3);

          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png', {
              subdomains: 'abcd',
              attribution: '&copy; OpenStreetMap &copy; CARTO',
              maxZoom: 20,
              noWrap: true,              // ВАЖНО: отключает "ленту" карт по горизонтали
              bounds: bounds             // Подсказывает слою его реальные границы
          }).addTo(map);
        </script>
    </body>
</html>
