<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
             integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
             crossorigin=""/>
        <style>
                body, html { margin: 0; padding: 0; height: 100%; background: #f0f0f0; }
                #map { width: 100%; height: 100vh; background: #000; }
                .leaflet-control-attribution { font-size: 10px !important; }
                .leaflet-control-layers-toggle { width: 44px !important; height: 44px !important; }
            </style>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
             integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
             crossorigin=""></script>
    </head>
    <body>
        <div id="map"></div>
        <script>
          var southWest = L.latLng(-89.9, -180);
          var northEast = L.latLng(89.9, 180);
          var bounds = L.latLngBounds(southWest, northEast);

          var darkTheme = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png', {
              subdomains: 'abcd',
              attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
              maxZoom: 19,
              noWrap: true,
              bounds: bounds
          });

          var lightTheme = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
              maxZoom: 19,
              noWrap: true,
              bounds: bounds
          });

          var savedTheme = localStorage.getItem('mapTheme');
          var initialLayer = (savedTheme === 'Light Mode') ? lightTheme : darkTheme;

          var map = L.map('map', {
              layers: [initialLayer],
              zoomControl: true,
              attributionControl: true,
              minZoom: 3,
              maxBounds: bounds,
              maxBoundsViscosity: 1.0
          }).setView([35, 10], 3);

          var baseMaps = {
              "Dark Mode": darkTheme,
              "Light Mode": lightTheme
          };

          L.control.layers(baseMaps, null, { collapsed: true }).addTo(map);

          map.on('baselayerchange', function(e) {
              localStorage.setItem('mapTheme', e.name);
          });
        </script>
    </body>
</html>
